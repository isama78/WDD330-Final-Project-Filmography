<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>Filmography | Home</title>
    <script type="module" src="/js/main.js"></script>
  </head>
  <body>
    <header></header>
    <main>
      <section class="hero-banner">
        <h2>Discover your next favorite movie</h2>
      </section>

      <section class="controls-bar">
        <form id="search-form" class="search-form">
          <input
            type="text"
            id="search-input"
            placeholder="Search movie..."
            required
          />
          <button type="submit">🔍</button>
        </form>

        <div class="filters">
          <select id="genre-select">
            <option value="">All Genres</option>
          </select>

          <select id="sort-select">
            <option value="trending">Trending Weekly</option>
            <option value="popularity.desc">Most Popular</option>
            <option value="vote_average.desc">Top Rated</option>
            <option value="primary_release_date.desc">Most Recent</option>
          </select>
        </div>
      </section>

      <h2 id="list-heading">Trending Movies</h2>
      <section id="trending-grid" class="movie-grid"></section>
    </main>
    <footer></footer>
  </body>
</html>
